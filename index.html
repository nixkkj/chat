<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Chat Seguro</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    #chat {
      width: 90%;
      max-width: 600px;
      margin: auto;
      margin-top: 20px;
      background: #1e293b;
      padding: 10px;
      border-radius: 10px;
    }

    #messages {
      height: 300px;
      overflow-y: auto;
      text-align: left;
      padding: 10px;
      background: #020617;
      border-radius: 5px;
      margin-bottom: 10px;
    }

    .msg {
      margin-bottom: 8px;
    }

    .meta {
      font-size: 12px;
      color: #94a3b8;
    }

    button {
      padding: 8px;
      border: none;
      background: #22c55e;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .deleteBtn {
      background: #ef4444;
      margin-left: 10px;
    }
  </style>
</head>
<body>

<h1>🔐 Chat Seguro</h1>

<button id="loginBtn">Entrar com Google</button>

<div id="chat" style="display:none;">
  <p id="userInfo"></p>

  <div id="messages"></div>

  <input id="msg" placeholder="Digite..." />
  <button onclick="sendMessage()">Enviar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  deleteDoc,
  doc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDDj9IeS53XEEv07dULX2-OWbVvQyQbf6Y",
  authDomain: "legion-chat-d69be.firebaseapp.com",
  projectId: "legion-chat-d69be",
  storageBucket: "legion-chat-d69be.firebasestorage.app",
  messagingSenderId: "880449921734",
  appId: "1:880449921734:web:cdf622d2af44cb6ae8adc7",
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const provider = new GoogleAuthProvider();

// 👑 COLOQUE AQUI O UID DO ADMIN
const ADMIN_UID = "COLE_UID_AQUI";

let currentUser = null;

// 🔐 login
document.getElementById("loginBtn").onclick = async () => {
  await signInWithPopup(auth, provider);
};

// 👤 estado do usuário
onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;

    document.getElementById("chat").style.display = "block";
    document.getElementById("loginBtn").style.display = "none";

    document.getElementById("userInfo").innerText =
      "Logado como: " + user.displayName;

    loadMessages();
  }
});

// 📤 enviar mensagem
window.sendMessage = async function () {
  const input = document.getElementById("msg");

  if (!input.value.trim()) return;

  await addDoc(collection(db, "messages"), {
    text: input.value,
    user: currentUser.displayName,
    uid: currentUser.uid,
    createdAt: serverTimestamp()
  });

  input.value = "";
};

// 📥 mensagens em tempo real
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, (snapshot) => {
    const messagesDiv = document.getElementById("messages");
    messagesDiv.innerHTML = "";

    snapshot.forEach((docSnap) => {
      const msg = docSnap.data();
      const id = docSnap.id;

      let time = "";
      if (msg.createdAt) {
        time = new Date(msg.createdAt.seconds * 1000)
          .toLocaleTimeString("pt-BR", {
            hour: "2-digit",
            minute: "2-digit"
          });
      }

      let html = `
        <div class="msg">
          <strong>${msg.user}</strong>: ${msg.text}
          <div class="meta">${time}</div>
      `;

      // 👑 admin real
      if (currentUser.uid === ADMIN_UID) {
        html += `<button class="deleteBtn" onclick="deleteMessage('${id}')">Apagar</button>`;
      }

      html += `</div>`;

      messagesDiv.innerHTML += html;
    });

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}

// 🛑 deletar
window.deleteMessage = async function (id) {
  await deleteDoc(doc(db, "messages", id));
};
</script>

</body>
</html>
