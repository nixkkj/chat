<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Chat com Logout, Toasts e Som</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="container">
    <div id="auth">
        <h2>Chat 🔒</h2>
        <input id="username" placeholder="Usuário" autocomplete="off" />
        <input id="password" type="password" placeholder="Senha" autocomplete="off" />
        <button onclick="register()">Registrar</button>
        <button onclick="login()">Entrar</button>
    </div>

    <div id="chat">
        <p id="userInfo"></p>
        <p id="onlineUsers"></p>
        <div id="messages"></div>
        <div id="inputArea">
           <input id="msg" placeholder="Digite sua mensagem..." autocomplete="off" />
           <button onclick="sendMessage()">Enviar</button>
       </div>
       <button id="logoutBtn" onclick="logout()">Sair</button>
       <div id="ipLink">
           <a href="ips.html" target="_blank">Ver Lista de IPs</a>
       </div>
   </div>
</div>

<div id="toastContainer"></div>

<audio id="bubbleSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyDDj9IeS53XEEv07dULX2-OWbVvQyQbf6Y",
      authDomain: "legion-chat-d69be.firebaseapp.com",
      projectId: "legion-chat-d69be",
      storageBucket: "legion-chat-d69be.appspot.com",
      messagingSenderId: "880449921734",
      appId: "1:880449921734:web:cdf622d2af44cb6ae8adc7",
      measurementId: "G-3TJ325N7MQ"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const msgInput = document.getElementById("msg");
    const messages = document.getElementById("messages");
    const userInfo = document.getElementById("userInfo");
    const onlineUsersP = document.getElementById("onlineUsers");
    const bubbleSound = document.getElementById("bubbleSound");

    let currentUser = null;
    let username = "";

    // Toasts
    function showToast(msg, type = "info", dur = 5000) {
      const container = document.getElementById("toastContainer");
      const toast = document.createElement("div");
      toast.classList.add("toast", type);
      toast.innerHTML = `<span>${msg}</span><button class="closeToast">&times;</button>`;

      container.appendChild(toast);

      toast.querySelector(".closeToast").onclick = () => container.removeChild(toast);

      setTimeout(() => { if (container.contains(toast)) container.removeChild(toast); }, dur);
    }

    // Limpar inputs
    function clearInputs() {
      usernameInput.value = "";
      passwordInput.value = "";
      msgInput.value = "";
    }

    // Validação de entrada
    function validateInput(input) {
      return input.trim() !== "";
    }

    // Obter IP do usuário
    async function getUserIP() {
      try {
          const response = await fetch('https://api.ipify.org?format=json');
          const data = await response.json();
          return data.ip;
      } catch (error) {
          console.error('Erro ao obter o IP:', error);
          return null;
      }
    }

    // Registro
    window.register = async () => {
      if (!validateInput(usernameInput.value) || !validateInput(passwordInput.value)) {
          showToast("Preencha todos os campos", "error");
          return;
      }
      const email = `${usernameInput.value}@chat.local`;
      try {
          const userCred = await createUserWithEmailAndPassword(auth, email, passwordInput.value);
          const ip = await getUserIP();
          await setDoc(doc(db, "users", userCred.user.uid), { name: usernameInput.value, online: true, lastOnline: serverTimestamp(), ip });
          showToast("Conta criada com sucesso!", "success");
          clearInputs();
      } catch (e) {
          showToast("Erro: " + e.message, "error");
      }
    };

    // Login
    window.login = async () => {
      if (!validateInput(usernameInput.value) || !validateInput(passwordInput.value)) {
          showToast("Preencha todos os campos", "error");
          return;
      }
      const email = `${usernameInput.value}@chat.local`;
      try {
          await signInWithEmailAndPassword(auth, email, passwordInput.value);
          clearInputs();
      } catch (e) {
          showToast("Erro no login: " + e.message, "error");
      }
    };

    // Logout
    window.logout = async () => {
      if (currentUser) {
          await setDoc(doc(db, "users", currentUser.uid), { online: false, lastOnline: serverTimestamp() }, { merge: true });
          await signOut(auth);
          showToast("Desconectado", "info");
      }
    };

    // Auth state
    onAuthStateChanged(auth, async user => {
      if (user) {
          currentUser = user;
          const userDoc = await getDoc(doc(db, "users", user.uid));
          username = userDoc.exists() ? userDoc.data().name : "Usuário";
          await setDoc(doc(db, "users", user.uid), { online: true, lastOnline: serverTimestamp(), name: username }, { merge: true });
          document.getElementById("auth").style.display = "none";
          document.getElementById("chat").style.display = "flex";
          userInfo.innerText = `Logado como: ${username}`;
          msgInput.focus();
          loadMessages();
          monitorOnlineUsers();
      } else {
          currentUser = null;
          username = "";
          document.getElementById("auth").style.display = "block";
          document.getElementById("chat").style.display = "none";
      }
    });

    // Enviar mensagem
    window.sendMessage = async () => {
      if (!validateInput(msgInput.value)) return;
      try {
          await addDoc(collection(db, "messages"), { text: msgInput.value, user: username, uid: currentUser.uid, createdAt: serverTimestamp() });
          bubbleSound.play();
          msgInput.value = "";
      } catch (e) {
          showToast("Erro ao enviar mensagem: " + e.message, "error");
      }
};

   // Escapar HTML
   function escapeHtml(text) {
       const div = document.createElement("div");
       div.textContent = text;
       return div.innerHTML;
   }

   // Carregar mensagens
   function loadMessages() {
       const q = query(collection(db, "messages"), orderBy("createdAt"));
       onSnapshot(q, snapshot => {
           messages.innerHTML = "";
           snapshot.forEach(docSnap => {
               const msgData = docSnap.data();
               msgData.id = docSnap.id;
               const isMe = msgData.uid === currentUser.uid;
               const time = msgData.createdAt ? new Date(msgData.createdAt.seconds * 1000).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" }) : "";
               const row = document.createElement("div");
               row.classList.add("messageRow");
               row.style.justifyContent = isMe ? "flex-end" : "flex-start";
               const msgDiv = document.createElement("div");
               msgDiv.classList.add(isMe ? "me" : "other");
               msgDiv.innerHTML = `<div class="messageHeader">${escapeHtml(msgData.user)}</div><div>${escapeHtml(msgData.text)}</div><div class="meta">${time}</div>`;
               row.appendChild(msgDiv);
               messages.appendChild(row);
               if (!isMe) bubbleSound.play();
           });
           messages.scrollTop = messages.scrollHeight;
       });
   }

   // Monitor online users
   function monitorOnlineUsers() {
       const q = query(collection(db, "users"));
       onSnapshot(q, snapshot => {
           const onlineUsers = [];
           snapshot.forEach(docSnap => {
               const data = docSnap.data();
               if (data.online) onlineUsers.push(data.name);
           });
           onlineUsersP.innerText = "Online: " + (onlineUsers.length > 0 ? onlineUsers.join(", ") : "Nenhum");
       });
   }
</script>
</body>
</html>
