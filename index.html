<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Chat Seguro</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    #container {
      max-width: 400px;
      margin: auto;
      margin-top: 40px;
    }

    #chat {
      display: none;
      margin-top: 20px;
      background: #1e293b;
      padding: 10px;
      border-radius: 10px;
    }

    #messages {
      height: 300px;
      overflow-y: auto;
      background: #020617;
      padding: 10px;
      border-radius: 5px;
      text-align: left;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 8px;
      border: none;
      background: #22c55e;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 5px;
    }

    .deleteBtn {
      background: red;
      margin-left: 5px;
    }

    .reportBtn {
      background: orange;
      margin-left: 5px;
    }

    .meta {
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<div id="container">

  <div id="auth">
    <h2>🔐 Login / Registro</h2>

    <input id="name" placeholder="Nome (registro)" />
    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Senha" />

    <button onclick="register()">Registrar</button>
    <button onclick="login()">Entrar</button>
  </div>

  <div id="chat">
    <p id="userInfo"></p>

    <div id="messages"></div>

    <input id="msg" placeholder="Digite..." />
    <button onclick="sendMessage()">Enviar</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  deleteDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDDj9IeS53XEEv07dULX2-OWbVvQyQbf6Y",
  authDomain: "legion-chat-d69be.firebaseapp.com",
  projectId: "legion-chat-d69be",
  storageBucket: "legion-chat-d69be.firebasestorage.app",
  messagingSenderId: "880449921734",
  appId: "1:880449921734:web:cdf622d2af44cb6ae8adc7",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 👑 admin
const ADMIN_UID = "COLE_UID_AQUI";

// 📡 webhook discord
const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1487845386151526400/jUErqNQcd6WV97GJG1vjyjW-YeNHC8_ykDnp8TCFvQAGbmnEjaXCSmN8mZlnJCC0MmTZ";

let currentUser = null;
let username = "";

// 🔐 FORÇAR LOGOUT AO RECARREGAR
signOut(auth);

// 📝 registro
window.register = async () => {
  const name = nameInput.value;
  const email = emailInput.value;
  const password = passwordInput.value;

  const userCred = await createUserWithEmailAndPassword(auth, email, password);

  await setDoc(doc(db, "users", userCred.user.uid), {
    name: name
  });

  alert("Conta criada!");
};

// 🔐 login
window.login = async () => {
  await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
};

// 👤 estado
auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;

    const userDoc = await getDoc(doc(db, "users", user.uid));
    username = userDoc.data().name;

    // esconder login
    document.getElementById("auth").style.display = "none";
    document.getElementById("chat").style.display = "block";

    userInfo.innerText = "Logado como: " + username;

    loadMessages();
  }
});

// 📤 enviar
window.sendMessage = async () => {
  if (!msg.value.trim()) return;

  await addDoc(collection(db, "messages"), {
    text: msg.value,
    user: username,
    uid: currentUser.uid,
    createdAt: serverTimestamp()
  });

  msg.value = "";
};

// 🚨 denunciar
window.reportMessage = async (msgData) => {

  await fetch(DISCORD_WEBHOOK, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      content:
        "🚨 DENÚNCIA\n\n" +
        "👤 Denunciado: " + msgData.user + "\n" +
        "🧑 Denunciante: " + username + "\n" +
        "💬 Mensagem: " + msgData.text
    })
  });

  alert("Denunciado com sucesso!");
};

// 📥 mensagens
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, (snapshot) => {
    messages.innerHTML = "";

    snapshot.forEach((docSnap) => {
      const msgData = docSnap.data();
      const id = docSnap.id;

      let time = "";
      if (msgData.createdAt) {
        time = new Date(msgData.createdAt.seconds * 1000)
          .toLocaleTimeString("pt-BR", {
            hour: "2-digit",
            minute: "2-digit"
          });
      }

      let html = `
        <div>
          <b>${msgData.user}</b>: ${msgData.text}
          <div class="meta">${time}</div>
          <button class="reportBtn"
            onclick='reportMessage(${JSON.stringify(msgData)})'>
            Denunciar
          </button>
      `;

      if (currentUser.uid === ADMIN_UID) {
        html += `<button class="deleteBtn" onclick="deleteMessage('${id}')">Apagar</button>`;
      }

      html += "</div>";

      messages.innerHTML += html;
    });
  });
}

// 🛑 deletar
window.deleteMessage = async (id) => {
  await deleteDoc(doc(db, "messages", id));
};
</script>

</body>
</html>
