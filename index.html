<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Chat Seguro</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    #container {
      max-width: 400px;
      margin: auto;
      margin-top: 40px;
    }

    input {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      width: 100%;
      border: none;
      background: #22c55e;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 5px;
    }

    #chat {
      display: none;
      margin-top: 20px;
      background: #1e293b;
      padding: 10px;
      border-radius: 10px;
    }

    #messages {
      height: 300px;
      overflow-y: auto;
      background: #020617;
      padding: 10px;
      border-radius: 5px;
      text-align: left;
    }

    .msg {
      margin-bottom: 8px;
    }

    .meta {
      font-size: 12px;
      color: #94a3b8;
    }

    .deleteBtn {
      background: red;
      margin-left: 10px;
    }
  </style>
</head>
<body>

<div id="container">

  <h2>🔐 Login / Registro</h2>

  <input id="name" placeholder="Nome (registro)" />
  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Senha" />

  <button onclick="register()">Registrar</button>
  <button onclick="login()">Entrar</button>

  <div id="chat">
    <p id="userInfo"></p>

    <div id="messages"></div>

    <input id="msg" placeholder="Digite..." />
    <button onclick="sendMessage()">Enviar</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  deleteDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDDj9IeS53XEEv07dULX2-OWbVvQyQbf6Y",
  authDomain: "legion-chat-d69be.firebaseapp.com",
  projectId: "legion-chat-d69be",
  storageBucket: "legion-chat-d69be.firebasestorage.app",
  messagingSenderId: "880449921734",
  appId: "1:880449921734:web:cdf622d2af44cb6ae8adc7",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 👑 UID do admin
const ADMIN_UID = "COLE_UID_AQUI";

let currentUser = null;
let username = "";

// 📝 REGISTRO
window.register = async function () {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const userCred = await createUserWithEmailAndPassword(auth, email, password);

  // salva nome no banco
  await setDoc(doc(db, "users", userCred.user.uid), {
    name: name
  });

  alert("Conta criada!");
};

// 🔐 LOGIN
window.login = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  await signInWithEmailAndPassword(auth, email, password);
};

// 👤 estado
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;

    const userDoc = await getDoc(doc(db, "users", user.uid));
    username = userDoc.data().name;

    document.getElementById("chat").style.display = "block";
    document.getElementById("userInfo").innerText = "Logado como: " + username;

    loadMessages();
  }
});

// 📤 enviar mensagem
window.sendMessage = async function () {
  const input = document.getElementById("msg");

  if (!input.value.trim()) return;

  await addDoc(collection(db, "messages"), {
    text: input.value,
    user: username,
    uid: currentUser.uid,
    createdAt: serverTimestamp()
  });

  input.value = "";
};

// 📥 mensagens
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, (snapshot) => {
    const messagesDiv = document.getElementById("messages");
    messagesDiv.innerHTML = "";

    snapshot.forEach((docSnap) => {
      const msg = docSnap.data();
      const id = docSnap.id;

      let time = "";
      if (msg.createdAt) {
        time = new Date(msg.createdAt.seconds * 1000)
          .toLocaleTimeString("pt-BR", {
            hour: "2-digit",
            minute: "2-digit"
          });
      }

      let html = `
        <div class="msg">
          <strong>${msg.user}</strong>: ${msg.text}
          <div class="meta">${time}</div>
      `;

      if (currentUser.uid === ADMIN_UID) {
        html += `<button class="deleteBtn" onclick="deleteMessage('${id}')">Apagar</button>`;
      }

      html += `</div>`;

      messagesDiv.innerHTML += html;
    });

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}

// 🛑 deletar
window.deleteMessage = async function (id) {
  await deleteDoc(doc(db, "messages", id));
};
</script>

</body>
</html>
