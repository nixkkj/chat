<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Chat Profissional Melhorado</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-primary: #0b132b;
    --bg-chat: rgba(15, 23, 42, 0.85);
    --msg-me-bg: #38b000;
    --msg-other-bg: rgba(59, 89, 152, 0.85);
    --btn-report-bg: #ff8c00;
    --btn-report-hover-bg: #ff6c00;
    --btn-delete-bg: #d90429;
    --btn-delete-hover-bg: #a9031e;
    --text-meta: #d6d9df;
    --scrollbar-bg: #223355;
    --scrollbar-thumb: #4a69bd;
  }

  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-primary);
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    color: white;
  }

  #container {
    width: 100%;
    max-width: 900px;
    margin: 30px 10px 50px;
  }

  #auth {
    text-align: center;
  }

  #auth input {
    display: block;
    width: 80%;
    max-width: 400px;
    margin: 10px auto;
    padding: 12px 16px;
    border-radius: 10px;
    border: none;
    background: rgba(255 255 255 / 0.05);
    color: white;
    font-size: 16px;
  }

  #auth input::placeholder {
    color: #cbd5f5;
  }

  #auth button {
    margin: 5px;
    padding: 12px 28px;
    border-radius: 10px;
    border: none;
    background-color: var(--msg-me-bg);
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: background-color 0.2s ease;
  }

  #auth button:hover {
    background-color: #2ea400;
  }

  #chat {
    display: none;
    height: 80vh;
    background: var(--bg-chat);
    border-radius: 20px;
    box-shadow: 0 8px 20px rgb(0 0 0 / 0.5);
    padding: 15px;
    display: flex;
    flex-direction: column;
  }

  #userInfo {
    margin-bottom: 12px;
    font-weight: 600;
    text-align: center;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding-right: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  /* Scrollbar personalizado */
  #messages::-webkit-scrollbar {
    width: 10px;
  }
  #messages::-webkit-scrollbar-track {
    background: var(--scrollbar-bg);
    border-radius: 10px;
  }
  #messages::-webkit-scrollbar-thumb {
    background: var(--scrollbar-thumb);
    border-radius: 10px;
  }

  .messageRow {
    display: flex;
    max-width: 60%;
    position: relative;
  }

  .me {
    margin-left: auto;
    background: var(--msg-me-bg);
    border-radius: 16px 16px 0 16px;
    color: white;
    padding: 12px 16px;
    box-shadow: 0 3px 8px rgb(56 176 0 / 0.6);
    word-break: break-word;
    position: relative;
  }

  .other {
    margin-right: auto;
    background: var(--msg-other-bg);
    border-radius: 16px 16px 16px 0;
    color: white;
    padding: 12px 16px;
    box-shadow: 0 3px 8px rgb(59 89 152 / 0.6);
    word-break: break-word;
    position: relative;
  }

  /* Cauda bolha */
  .me::after, .other::after {
    content: "";
    position: absolute;
    bottom: 0;
    width: 15px;
    height: 15px;
    background: inherit;
  }
  .me::after {
    right: -8px;
    border-bottom-left-radius: 15px;
    clip-path: polygon(100% 0, 0 100%, 100% 100%);
    box-shadow: 2px 2px 3px rgb(0 0 0 / 0.2);
  }
  .other::after {
    left: -8px;
    border-bottom-right-radius: 15px;
    clip-path: polygon(0 0, 100% 100%, 0 100%);
    box-shadow: -2px 2px 3px rgb(0 0 0 / 0.2);
  }

  .messageHeader {
    font-weight: 700;
    margin-bottom: 6px;
  }

  .meta {
    font-size: 11px;
    color: var(--text-meta);
    text-align: right;
    margin-top: 6px;
  }

  #inputArea {
    margin-top: 15px;
    display: flex;
    gap: 12px;
  }

  #inputArea input {
    flex: 1;
    padding: 14px 16px;
    border-radius: 18px;
    border: none;
    font-size: 16px;
    background: rgba(255 255 255 / 0.05);
    color: white;
    outline-offset: 2px;
    transition: outline-color 0.2s;
  }

  #inputArea input::placeholder {
    color: #d3d9e6aa;
  }

  #inputArea input:focus {
    outline: 2px solid var(--msg-me-bg);
  }

  #inputArea button {
    padding: 14px 24px;
    border-radius: 18px;
    border: none;
    background-color: var(--msg-me-bg);
    font-weight: 700;
    color: white;
    cursor: pointer;
    transition: background-color 0.2s ease;
    user-select: none;
  }

  #inputArea button:hover {
    background-color: #2ea400;
  }

  /* Botão denunciar */
  button.reportBtn {
    background-color: var(--btn-report-bg);
    border: none;
    padding: 6px 10px;
    font-weight: 700;
    font-size: 11px;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    user-select: none;
    opacity: 0;
    transition: opacity 0.15s ease;
    position: absolute;
    bottom: 10px;
    left: 10px;
    box-shadow: 0 0 6px rgb(255 140 0 / 0.8);
  }

  button.reportBtn:hover {
    background-color: var(--btn-report-hover-bg);
  }

  .messageRow:hover button.reportBtn {
    opacity: 1;
  }

  /* Botão apagar (admin) */
  button.deleteBtn {
    background-color: var(--btn-delete-bg);
    border: none;
    padding: 6px 10px;
    font-weight: 700;
    font-size: 11px;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    user-select: none;
    opacity: 0;
    transition: opacity 0.15s ease;
    position: absolute;
    bottom: 10px;
    right: 10px;
    box-shadow: 0 0 6px rgb(217 4 41 / 0.9);
  }

  button.deleteBtn:hover {
    background-color: var(--btn-delete-hover-bg);
  }

  .messageRow:hover button.deleteBtn {
    opacity: 1;
  }
</style>
</head>
<body>
<div id="container">

  <div id="auth">
    <h2>Chat Profissional 🔒</h2>
    <input id="name" placeholder="Nome (Registro)" autocomplete="off" />
    <input id="email" placeholder="Email" autocomplete="off" />
    <input id="password" type="password" placeholder="Senha" autocomplete="off" />
    <button onclick="register()">Registrar</button>
    <button onclick="login()">Entrar</button>
  </div>

  <div id="chat">
    <p id="userInfo"></p>
    <div id="messages"></div>
    <div id="inputArea">
      <input id="msg" placeholder="Digite sua mensagem..." autocomplete="off" />
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDDj9IeS53XEEv07dULX2-OWbVvQyQbf6Y",
  authDomain: "legion-chat-d69be.firebaseapp.com",
  projectId: "legion-chat-d69be",
  storageBucket: "legion-chat-d69be.firebasestorage.app",
  messagingSenderId: "880449921734",
  appId: "1:880449921734:web:cdf622d2af44cb6ae8adc7",
  measurementId: "G-3TJ325N7MQ"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const msgInput = document.getElementById("msg");
const messages = document.getElementById("messages");
const userInfo = document.getElementById("userInfo");

const ADMIN_UID = "SEU_ADMIN_UID";
const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1487845386151526400/jUErqNQcd6WV97GJG1vjyjW-YeNHC8_ykDnp8TCFvQAGbmnEjaXCSmN8mZlnJCC0MmTZ";

let currentUser = null;
let username = "";

// Logout automático no reload
signOut(auth);

// Registro
window.register = async () => {
  if (!nameInput.value.trim() || !emailInput.value.trim() || !passwordInput.value.trim()) {
    alert("Preencha todos os campos!");
    return;
  }
  try {
    const userCred = await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
    await setDoc(doc(db, "users", userCred.user.uid), { name: nameInput.value });
    alert("Conta criada com sucesso!");
  } catch (e) {
    alert("Erro no registro: " + e.message);
  }
};

// Login
window.login = async () => {
  if (!emailInput.value.trim() || !passwordInput.value.trim()) {
    alert("Preencha email e senha!");
    return;
  }
  try {
    const userCred = await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
    const userRef = doc(db, "users", userCred.user.uid);
    const userDoc = await getDoc(userRef);
    if (!userDoc.exists()) {
      alert("Usuário não encontrado!");
      return;
    }
    username = userDoc.data().name;
  } catch (e) {
    alert("Erro no login: " + e.message);
  }
};

// Estado auth
auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;
    const userDoc = await getDoc(doc(db, "users", user.uid));
    username = userDoc.data().name;

    document.getElementById("auth").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    userInfo.innerText = `Logado como: ${username}`;

    loadMessages();
  }
});

// Enviar mensagem
window.sendMessage = async () => {
  if (!msgInput.value.trim()) return;
  try {
    await addDoc(collection(db, "messages"), {
      text: msgInput.value,
      user: username,
      uid: currentUser.uid,
      createdAt: serverTimestamp(),
      reportedBy: []
    });
    msgInput.value = "";
  } catch (e) {
    alert("Erro ao enviar mensagem: " + e.message);
  }
};

// Denunciar mensagem
window.reportMessage = async (msgData) => {
  if (msgData.uid === currentUser.uid) return; // Não pode denunciar a si mesmo
  if (msgData.reportedBy && msgData.reportedBy.includes(currentUser.uid)) return; // Já denunciou

  try {
    const msgRef = doc(db, "messages", msgData.id);
    const updatedReportedBy = msgData.reportedBy ? [...msgData.reportedBy, currentUser.uid] : [currentUser.uid];
    await updateDoc(msgRef, { reportedBy: updatedReportedBy });

    // Webhook Discord
    await fetch(DISCORD_WEBHOOK, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        content: `🚨 DENÚNCIA\n👤 Denunciado: ${msgData.user}\n🧑 Denunciante: ${username}\n💬 Mensagem: ${msgData.text}`
      })
    });
  } catch (e) {
    alert("Erro ao denunciar mensagem: " + e.message);
  }
};

// Carregar mensagens
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));
  onSnapshot(q, snapshot => {
    messages.innerHTML = "";
    snapshot.forEach(docSnap => {
      const msgData = docSnap.data();
      msgData.id = docSnap.id;
      const isMe = msgData.uid === currentUser.uid;
      const time = msgData.createdAt ? new Date(msgData.createdAt.seconds * 1000).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" }) : "";

      // Construir mensagem
      const row = document.createElement("div");
      row.classList.add("messageRow");
      row.style.justifyContent = isMe ? "flex-end" : "flex-start";

      const msgDiv = document.createElement("div");
      msgDiv.classList.add(isMe ? "me" : "other");

      // Conteúdo da mensagem
      msgDiv.innerHTML = `<div class="messageHeader">${msgData.user}</div><div>${escapeHtml(msgData.text)}</div><div class="meta">${time}</div>`;

      // Botão denunciar só se for mensagem de outro e não denunciou ainda
      if (!isMe && (!msgData.reportedBy || !msgData.reportedBy.includes(currentUser.uid))) {
        const reportBtn = document.createElement("button");
        reportBtn.classList.add("reportBtn");
        reportBtn.textContent = "Denunciar";
        reportBtn.onclick = () => reportMessage(msgData);
        msgDiv.appendChild(reportBtn);
      }

      // Botão apagar para admin
      if (currentUser.uid === ADMIN_UID) {
        const deleteBtn = document.createElement("button");
        deleteBtn.classList.add("deleteBtn");
        deleteBtn.textContent = "Apagar";
        deleteBtn.onclick = () => deleteMessage(msgData.id);
        msgDiv.appendChild(deleteBtn);
      }

      row.appendChild(msgDiv);
      messages.appendChild(row);
    });

    messages.scrollTop = messages.scrollHeight;
  });
}

// Deletar mensagem (admin)
window.deleteMessage = async (id) => {
  try {
    await deleteDoc(doc(db, "messages", id));
  } catch (e) {
    alert("Erro ao apagar mensagem: " + e.message);
  }
};

// Função para escapar texto para evitar XSS
function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}
</script>
</body>
</html>
