<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Chat Seguro</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

#container {
  max-width: 800px;
  width: 100%;
  margin-top: 20px;
}

#auth {
  margin-top: 40px;
}

#chat {
  display: none;
  height: 80vh;
  display: flex;
  flex-direction: column;
  border-radius: 10px;
  background: #1e293b;
  padding: 10px;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

.messageRow {
  display: flex;
  margin: 5px 0;
}

.msg {
  max-width: 60%;
  padding: 10px 15px;
  border-radius: 20px;
  word-wrap: break-word;
  position: relative;
}

.me {
  background: #22c55e;
  color: white;
  align-self: flex-end;
  border-bottom-right-radius: 0;
}

.other {
  background: #334155;
  color: white;
  align-self: flex-start;
  border-bottom-left-radius: 0;
}

.meta {
  font-size: 10px;
  color: #cbd5f5;
  margin-top: 5px;
  text-align: right;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px;
  margin-left: 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

#inputArea {
  display: flex;
  gap: 5px;
  margin-top: 5px;
}

.deleteBtn { background: red; }
.reportBtn { background: orange; }
</style>
</head>

<body>

<div id="container">

  <div id="auth">
    <h2>🔐 Login / Registro</h2>
    <input id="name" placeholder="Nome (registro)">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Senha">
    <button onclick="register()">Registrar</button>
    <button onclick="login()">Entrar</button>
  </div>

  <div id="chat">
    <p id="userInfo"></p>
    <div id="messages"></div>
    <div id="inputArea">
      <input id="msg" placeholder="Digite...">
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDDj9IeS53XEEv07dULX2-OWbVvQyQbf6Y",
  authDomain: "legion-chat-d69be.firebaseapp.com",
  projectId: "legion-chat-d69be",
  storageBucket: "legion-chat-d69be.firebasestorage.app",
  messagingSenderId: "880449921734",
  appId: "1:880449921734:web:cdf622d2af44cb6ae8adc7",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// elementos
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const msg = document.getElementById("msg");
const messages = document.getElementById("messages");
const userInfo = document.getElementById("userInfo");

// configs
const ADMIN_UID = "COLE_UID_AQUI";
const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1487845386151526400/jUErqNQcd6WV97GJG1vjyjW-YeNHC8_ykDnp8TCFvQAGbmnEjaXCSmN8mZlnJCC0MmTZ";

let currentUser = null;
let username = "";

// logout ao recarregar
signOut(auth);

// registro
window.register = async () => {
  const userCred = await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
  await setDoc(doc(db, "users", userCred.user.uid), {
    name: nameInput.value,
    loggedIn: false
  });
  alert("Conta criada!");
};

// login
window.login = async () => {
  const email = emailInput.value;
  const password = passwordInput.value;

  const userCred = await signInWithEmailAndPassword(auth, email, password);
  const userRef = doc(db, "users", userCred.user.uid);
  const userDoc = await getDoc(userRef);

  if (userDoc.data().loggedIn) {
    alert("Essa conta já está conectada em outro lugar!");
    await signOut(auth);
    return;
  }

  await updateDoc(userRef, { loggedIn: true });
};

// logout ao sair da aba
window.addEventListener("beforeunload", async () => {
  if (currentUser) {
    const userRef = doc(db, "users", currentUser.uid);
    await updateDoc(userRef, { loggedIn: false });
  }
});

// estado auth
auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;
    const userDoc = await getDoc(doc(db, "users", user.uid));
    username = userDoc.data().name;

    document.getElementById("auth").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    userInfo.innerText = "Logado como: " + username;

    loadMessages();
  }
});

// enviar msg
window.sendMessage = async () => {
  if (!msg.value.trim()) return;
  await addDoc(collection(db, "messages"), {
    text: msg.value,
    user: username,
    uid: currentUser.uid,
    createdAt: serverTimestamp(),
    reportedBy: []
  });
  msg.value = "";
};

// denunciar
window.reportMessage = async (msgData) => {
  if (msgData.reportedBy.includes(currentUser.uid)) {
    alert("Você já denunciou essa mensagem!");
    return;
  }

  // atualizar array de denunciantes
  const msgRef = doc(db, "messages", msgData.id);
  await updateDoc(msgRef, { reportedBy: [...msgData.reportedBy, currentUser.uid] });

  await fetch(DISCORD_WEBHOOK, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      content:
        "🚨 DENÚNCIA\n\n" +
        "👤 Denunciado: " + msgData.user + "\n" +
        "🧑 Denunciante: " + username + "\n" +
        "💬 Mensagem: " + msgData.text
    })
  });

  alert("Denunciado!");
};

// carregar mensagens
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));

  onSnapshot(q, (snapshot) => {
    messages.innerHTML = "";
    snapshot.forEach((docSnap) => {
      const msgData = docSnap.data();
      msgData.id = docSnap.id;

      const isMe = msgData.uid === currentUser.uid;
      let time = msgData.createdAt ? new Date(msgData.createdAt.seconds * 1000).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}) : "";

      let html = `
        <div class="messageRow" style="justify-content:${isMe ? "flex-end":"flex-start"}">
          <div class="msg ${isMe ? "me":"other"}">
            <b>${msgData.user}</b><br>
            ${msgData.text}
            <div class="meta">${time}</div>
            <button class="reportBtn" onclick='reportMessage(${JSON.stringify(msgData)})'>Denunciar</button>
      `;

      if (currentUser.uid === ADMIN_UID) {
        html += `<button class="deleteBtn" onclick="deleteMessage('${msgData.id}')">Apagar</button>`;
      }

      html += `</div></div>`;
      messages.innerHTML += html;
    });
    messages.scrollTop = messages.scrollHeight;
  });
}

// deletar
window.deleteMessage = async (id) => {
  await deleteDoc(doc(db, "messages", id));
};
</script>

</body>
</html>
