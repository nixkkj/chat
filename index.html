<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Chat Temático Profissional</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0c111b;
  --bg-chat: rgba(30, 41, 59, 0.9);
  --msg-me: rgba(34, 197, 94, 0.9);
  --msg-other: rgba(51, 65, 85, 0.9);
  --meta-color: #cbd5f5;
  --input-bg: rgba(255,255,255,0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-primary);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  color: white;
}

#container {
  width: 95%;
  max-width: 900px;
  margin-top: 30px;
}

#auth {
  text-align: center;
}

#auth input {
  display: block;
  width: 80%;
  margin: 10px auto;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: var(--input-bg);
  color: white;
}

#auth input::placeholder { color: #cbd5f5; }

#auth button {
  margin: 5px;
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #22c55e;
  color: white;
  transition: 0.2s;
}

#auth button:hover { opacity: 0.85; }

#chat {
  display: none;
  flex-direction: column;
  height: 80vh;
  background: var(--bg-chat);
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
  backdrop-filter: blur(5px);
}

#userInfo {
  text-align: center;
  margin-bottom: 10px;
  font-weight: 600;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
}

.messageRow { display: flex; }

.msg {
  max-width: 60%;
  padding: 14px 18px;
  word-wrap: break-word;
  border-radius: 20px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.3);
  position: relative;
  transition: transform 0.1s;
}

.msg:hover { transform: scale(1.02); }

.me { background: var(--msg-me); margin-left: auto; border-radius: 20px 20px 0 20px; }
.other { background: var(--msg-other); margin-right: auto; border-radius: 20px 20px 20px 0; }

.meta { font-size: 10px; color: var(--meta-color); margin-top: 5px; text-align: right; }

#inputArea {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

#inputArea input {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: var(--input-bg);
  color: white;
}

button.deleteBtn { background: red; color: white; border-radius: 6px; padding: 6px 10px; cursor: pointer; }
button.reportBtn { background: orange; color: white; border-radius: 6px; padding: 6px 10px; cursor: pointer; }
button.deleteBtn:hover, button.reportBtn:hover { opacity: 0.85; }
</style>
</head>
<body>
<div id="container">

  <div id="auth">
    <h2>Chat Profissional 🔒</h2>
    <input id="name" placeholder="Nome (Registro)">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Senha">
    <button onclick="register()">Registrar</button>
    <button onclick="login()">Entrar</button>
  </div>

  <div id="chat">
    <p id="userInfo"></p>
    <div id="messages"></div>
    <div id="inputArea">
      <input id="msg" placeholder="Digite sua mensagem...">
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDDj9IeS53XEEv07dULX2-OWbVvQyQbf6Y",
  authDomain: "legion-chat-d69be.firebaseapp.com",
  projectId: "legion-chat-d69be",
  storageBucket: "legion-chat-d69be.firebasestorage.app",
  messagingSenderId: "880449921734",
  appId: "1:880449921734:web:cdf622d2af44cb6ae8adc7",
  measurementId: "G-3TJ325N7MQ"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const msgInput = document.getElementById("msg");
const messages = document.getElementById("messages");
const userInfo = document.getElementById("userInfo");

const ADMIN_UID = "COLE_UID_AQUI";
const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1487845386151526400/jUErqNQcd6WV97GJG1vjyjW-YeNHC8_ykDnp8TCFvQAGbmnEjaXCSmN8mZlnJCC0MmTZ";

let currentUser = null;
let username = "";

// Logout automático
signOut(auth);

// Registro
window.register = async () => {
  if (!nameInput.value || !emailInput.value || !passwordInput.value) return alert("Preencha todos os campos!");
  const userCred = await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
  await setDoc(doc(db, "users", userCred.user.uid), { name: nameInput.value });
  alert("Conta criada!");
};

// Login
window.login = async () => {
  if (!emailInput.value || !passwordInput.value) return alert("Preencha email e senha!");
  const userCred = await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
  const userRef = doc(db, "users", userCred.user.uid);
  const userDoc = await getDoc(userRef);
  if (!userDoc.exists()) return alert("Usuário não encontrado!");
  username = userDoc.data().name;
};

// Estado auth
auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;
    const userDoc = await getDoc(doc(db, "users", user.uid));
    username = userDoc.data().name;

    document.getElementById("auth").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    userInfo.innerText = `Logado como: ${username}`;

    loadMessages();
  }
});

// Enviar mensagem
window.sendMessage = async () => {
  if (!msgInput.value.trim()) return;
  await addDoc(collection(db, "messages"), {
    text: msgInput.value,
    user: username,
    uid: currentUser.uid,
    createdAt: serverTimestamp(),
    reportedBy: []
  });
  msgInput.value = "";
};

// Denunciar mensagem profissional
window.reportMessage = async (msgData) => {
  if (msgData.uid === currentUser.uid) return;
  if (msgData.reportedBy && msgData.reportedBy.includes(currentUser.uid)) return;

  const msgRef = doc(db, "messages", msgData.id);
  const updatedReportedBy = msgData.reportedBy ? [...msgData.reportedBy, currentUser.uid] : [currentUser.uid];
  await updateDoc(msgRef, { reportedBy: updatedReportedBy });

  // Webhook Discord
  await fetch(DISCORD_WEBHOOK, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      content: `🚨 DENÚNCIA\n👤 Denunciado: ${msgData.user}\n🧑 Denunciante: ${username}\n💬 Mensagem: ${msgData.text}`
    })
  });
};

// Carregar mensagens
function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt"));
  onSnapshot(q, snapshot => {
    messages.innerHTML = "";
    snapshot.forEach(docSnap => {
      const msgData = docSnap.data();
      msgData.id = docSnap.id;
      const isMe = msgData.uid === currentUser.uid;
      const time = msgData.createdAt ? new Date(msgData.createdAt.seconds*1000).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}) : "";

      let html = `<div class="messageRow" style="justify-content:${isMe?"flex-end":"flex-start"}">
        <div class="msg ${isMe?"me":"other"}">
          <b>${msgData.user}</b><br>${msgData.text}<div class="meta">${time}</div>`;

      if (!isMe) html += `<button class="reportBtn" onclick='reportMessage(${JSON.stringify(msgData)})'>Denunciar</button>`;
      if (currentUser.uid === ADMIN_UID) html += `<button class="deleteBtn" onclick="deleteMessage('${msgData.id}')">Apagar</button>`;
      html += `</div></div>`;
      messages.innerHTML += html;
    });
    messages.scrollTop = messages.scrollHeight;
  });
}

// Deletar mensagem
window.deleteMessage = async (id) => {
  await deleteDoc(doc(db, "messages", id));
};
</script>
</body>
</html>
